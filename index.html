<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
        }
        .container {
            margin-top: 50px;
        }
        img {
            width: 260px;
            border-radius: 20px;
        }
        button {
            margin: 10px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #yes {
            background: green;
            color: white;
        }
        #no {
            background: red;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Will You Be Mine? ❤️</h1>
    <img src="photo.jpg">
    <p>Every moment with you feels like a dream 💖</p>

    <button id="yes" onclick="yesClick()">Yes 💖</button>
    <button id="no" onmouseover="moveButton()">No 😢</button>

    <h2 id="result"></h2>
</div>

<script>
function yesClick() {
    document.getElementById("result").innerHTML =
    "I Love You ❤️";
}

function moveButton() {
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    document.getElementById("no").style.left = x + "px";
    document.getElementById("no").style.top = y + "px";
}
</script>

</body>
</html>
